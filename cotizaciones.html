<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Cotizaciones"/>
<title>Cotizaciones Oftalmología</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;background:#F7F5F2;overscroll-behavior:none;}
  input,select,textarea,button{font-family:inherit;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-thumb{background:#C8C0B8;border-radius:4px;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useRef, useEffect} = React;

const C = {
  cream:"#F7F5F2", warm:"#FFFCF9", ink:"#1A1814", inkSoft:"#3D3830",
  stone:"#8A8178", stoneLight:"#C8C0B8", border:"#E5DED6",
  teal:"#0D6B72", tealPale:"#E8F4F5",
  gold:"#B07D2A", goldPale:"#FDF4E3",
  red:"#C03838", redPale:"#FDEAEA",
  orange:"#C05C10", orangePale:"#FEF0E6",
  green:"#1E7A48", greenPale:"#E6F5ED",
  blue:"#1A5FA8", bluePale:"#E8F0FA",
};

const SURGERY_DB = {
  "Catarata": ["Faco + LIO","Faco + LIO + Antiangio","Faco + Trabe","Faco + Vitre"],
  "Glaucoma": ["Trabeculectomía","Trabeculectomía con mitomicina C","Colocación de válvula de Ahmed"],
  "Retina y Vítreo": ["Cerclaje escleral","Vitrectomía","Inyección intravítrea (anti-VEGF)"],
  "Superficie Ocular": ["Excéresis de pterigión con autoinjerto + pegamento de fibrina","Resección de lesión palpebral / conjuntival"],
  "Láser": ["Láser diodo","Láser YAG"],
};
const ALL_SURGERIES = Object.values(SURGERY_DB).flat();
const LIO_TYPES = ["Monofocal hidrofílico","Monofocal hidrofóbico","Tórico","Multifocal","Multifocal tórico","EDOF","EDOF tórico","Acomodativo","Premium personalizado","Otro"];

const fmt    = (n) => (n!=null&&n!==""&&!isNaN(n)) ? new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN"}).format(n) : null;
const fmtD   = (d) => { if(!d) return ""; const [y,m,day]=d.split("-"); return `${parseInt(day)} ${["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][parseInt(m)-1]} ${y}`; };
const uid    = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const toStr  = () => new Date().toISOString().split("T")[0];
const isPast = (d) => d && d < toStr();
const dDiff  = (d) => { if(!d) return null; return Math.ceil((new Date(d)-new Date())/864e5); };

const mkEye  = () => ({surgery:"",surgeryPlus:[],lioNeeded:false,lioType:"",lioPower:"",lioNotes:"",dateTentative:"",dateScheduled:"",costs:{gastos:"",anest:"",implantes:"",otrosAmt:"",otrosDesc:""}});
const mkForm = () => ({name:"",tel1:"",tel2:"",activeEyes:[],eyeFirst:"",eyes:{OD:mkEye(),OI:mkEye()},status:"pending",notes:""});

// ── UI ──────────────────────────────────────────────────────
const Lbl = ({children,req}) => <label style={{display:"block",fontSize:"0.71rem",fontWeight:700,color:C.stone,marginBottom:4,letterSpacing:"0.04em",textTransform:"uppercase"}}>{children}{req&&<span style={{color:C.red,marginLeft:3}}>*</span>}</label>;

const Inp = ({err,style,...p}) => <input style={{width:"100%",padding:"11px 12px",border:`1.5px solid ${err?C.red:C.border}`,borderRadius:9,fontSize:"16px",color:C.ink,background:err?"#FFF0F0":"white",outline:"none",boxSizing:"border-box",...style}} {...p}/>;

const Sel = ({err,style,...p}) => <select style={{width:"100%",padding:"11px 12px",border:`1.5px solid ${err?C.red:C.border}`,borderRadius:9,fontSize:"16px",color:C.ink,background:err?"#FFF0F0":"white",outline:"none",boxSizing:"border-box",WebkitAppearance:"none",...style}} {...p}/>;

const Btn = ({variant="primary",style,...p}) => {
  const V={primary:{background:C.teal,color:"white",border:"none"},outline:{background:"white",color:C.teal,border:`1.5px solid ${C.teal}`},danger:{background:C.redPale,color:C.red,border:`1.5px solid #F0C0C0`}};
  return <button style={{display:"inline-flex",alignItems:"center",gap:6,padding:"11px 16px",borderRadius:9,fontSize:"0.85rem",fontWeight:700,cursor:"pointer",...V[variant],...style}} {...p}/>;
};

const Sec = ({title,children}) => <div style={{marginBottom:18}}><div style={{fontSize:"0.66rem",fontWeight:800,textTransform:"uppercase",letterSpacing:"0.12em",color:C.stone,marginBottom:10,paddingBottom:6,borderBottom:`1.5px solid ${C.border}`}}>{title}</div>{children}</div>;

const Fld = ({label,req,hint,err,children}) => <div style={{marginBottom:10}}><Lbl req={req}>{label}</Lbl>{children}{err&&<div style={{fontSize:"0.7rem",color:C.red,marginTop:3,fontWeight:600}}>⚠ {err}</div>}{!err&&hint&&<div style={{fontSize:"0.7rem",color:C.stone,marginTop:3}}>{hint}</div>}</div>;

const StatusBadge = ({s}) => {
  const M={pending:{bg:C.goldPale,c:C.gold,t:"⏳ Pendiente"},scheduled:{bg:C.tealPale,c:C.teal,t:"📅 Programada"},done:{bg:C.greenPale,c:C.green,t:"✅ Operado/a"}};
  const m=M[s]||M.pending;
  return <span style={{display:"inline-flex",padding:"3px 9px",borderRadius:20,fontSize:"0.71rem",fontWeight:700,background:m.bg,color:m.c,whiteSpace:"nowrap"}}>{m.t}</span>;
};

// ── SURGERY PICKER ──────────────────────────────────────────
function SurgeryPicker({value, onChange, placeholder="Buscar cirugía…"}) {
  const [open,setOpen] = useState(false);
  const [q,setQ] = useState(value||"");
  useEffect(()=>setQ(value||""),[value]);
  const matches = q.length>0 ? ALL_SURGERIES.filter(s=>s.toLowerCase().includes(q.toLowerCase())).slice(0,10) : [];
  const pick=(s)=>{ onChange(s); setQ(s); setOpen(false); };
  return (
    <div style={{position:"relative"}}>
      <Inp value={q} placeholder={placeholder}
        onChange={e=>{setQ(e.target.value);onChange(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),200)}/>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 2px)",left:0,right:0,background:"white",border:`1.5px solid ${C.border}`,borderRadius:10,boxShadow:"0 8px 28px rgba(0,0,0,0.14)",zIndex:2000,maxHeight:280,overflowY:"auto"}}>
          {q.length===0 && Object.entries(SURGERY_DB).map(([cat,items])=>(
            <div key={cat}>
              <div style={{padding:"5px 12px",fontSize:"0.62rem",fontWeight:800,textTransform:"uppercase",color:C.teal,background:C.tealPale,borderBottom:`1px solid ${C.border}`}}>{cat}</div>
              {items.map(s=><div key={s} onMouseDown={()=>pick(s)} onTouchEnd={(e)=>{e.preventDefault();pick(s);}} style={{padding:"10px 13px",fontSize:"0.9rem",cursor:"pointer",color:C.inkSoft,borderBottom:`1px solid ${C.border}`}}>{s}</div>)}
            </div>
          ))}
          {q.length>0 && matches.map(s=><div key={s} onMouseDown={()=>pick(s)} onTouchEnd={(e)=>{e.preventDefault();pick(s);}} style={{padding:"10px 13px",fontSize:"0.9rem",cursor:"pointer",color:C.inkSoft,borderBottom:`1px solid ${C.border}`}}>{s}</div>)}
          {q.length>0 && matches.length===0 && <div style={{padding:"10px 13px",fontSize:"0.85rem",color:C.stone,fontStyle:"italic"}}>Sin coincidencias — se guardará tal cual</div>}
        </div>
      )}
    </div>
  );
}

// ── EYE PANEL ───────────────────────────────────────────────
function EyePanel({data, onChange, errors={}}) {
  const [plusInput,setPlusInput] = useState("");
  const upd = (k,v) => onChange({...data,[k]:v});
  const upC = (k,v) => onChange({...data,costs:{...data.costs,[k]:v}});
  const addPlus=()=>{ if(!plusInput.trim()) return; upd("surgeryPlus",[...(data.surgeryPlus||[]),plusInput.trim()]); setPlusInput(""); };
  const remPlus=(i)=> upd("surgeryPlus",(data.surgeryPlus||[]).filter((_,j)=>j!==i));
  const total=["gastos","anest","implantes","otrosAmt"].reduce((s,k)=>s+(parseFloat(data.costs?.[k])||0),0);
  const noAnest=!data.costs?.anest||data.costs.anest==="";

  return (
    <div style={{background:C.cream,borderRadius:12,padding:14,border:`1.5px solid ${C.border}`}}>
      {/* Procedimiento */}
      <Fld label="Procedimiento" req err={errors.surgery}>
        <SurgeryPicker value={data.surgery||""} onChange={v=>upd("surgery",v)}/>
      </Fld>
      <div style={{marginBottom:14}}>
        <Lbl>Simultáneos <span style={{fontWeight:400,textTransform:"none",fontStyle:"italic"}}>(+)</span></Lbl>
        <div style={{display:"flex",gap:7}}>
          <div style={{flex:1}}><SurgeryPicker value={plusInput} onChange={setPlusInput} placeholder="Agregar simultáneo…"/></div>
          <Btn variant="outline" style={{padding:"10px 13px"}} onClick={addPlus}>+ Agregar</Btn>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:6}}>
          {(data.surgeryPlus||[]).map((p,i)=>(
            <span key={i} style={{background:C.tealPale,color:C.teal,borderRadius:6,padding:"3px 9px",fontSize:"0.8rem",fontWeight:700,display:"flex",alignItems:"center",gap:5}}>
              <span style={{opacity:0.5}}>+</span>{p}
              <button onMouseDown={()=>remPlus(i)} style={{background:"none",border:"none",color:C.teal,cursor:"pointer",padding:0,fontSize:"1rem",lineHeight:1,opacity:0.6}}>✕</button>
            </span>
          ))}
        </div>
      </div>

      {/* LIO */}
      <div style={{paddingTop:12,borderTop:`1px solid ${C.border}`,marginBottom:14}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:"0.9rem",fontWeight:600,marginBottom:data.lioNeeded?10:0}}>
          <input type="checkbox" checked={!!data.lioNeeded} onChange={e=>upd("lioNeeded",e.target.checked)} style={{width:18,height:18,accentColor:C.teal}}/>
          🔬 Lente intraocular (LIO)
        </label>
        {data.lioNeeded&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:8}}>
            <Fld label="Tipo de LIO">
              <Sel value={data.lioType||""} onChange={e=>upd("lioType",e.target.value)}>
                <option value="">Seleccionar…</option>
                {LIO_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </Sel>
            </Fld>
            <Fld label="Potencia" hint="Ej: +21.50 D">
              <Inp value={data.lioPower||""} onChange={e=>upd("lioPower",e.target.value)} placeholder="+21.50"/>
            </Fld>
            <Fld label="Marca / Modelo" style={{gridColumn:"1/-1"}}>
              <Inp value={data.lioNotes||""} onChange={e=>upd("lioNotes",e.target.value)} placeholder="Ej. Alcon AcrySof"/>
            </Fld>
          </div>
        )}
      </div>

      {/* Fechas */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,paddingTop:12,borderTop:`1px solid ${C.border}`,marginBottom:14}}>
        <Fld label="Fecha tentativa" hint="Estimada">
          <Inp type="date" value={data.dateTentative||""} onChange={e=>upd("dateTentative",e.target.value)}/>
        </Fld>
        <Fld label="Fecha programada" hint="Confirmada">
          <Inp type="date" value={data.dateScheduled||""} onChange={e=>upd("dateScheduled",e.target.value)} style={{borderColor:data.dateScheduled?C.teal:C.border,fontWeight:data.dateScheduled?700:400}}/>
        </Fld>
      </div>

      {/* Cotización */}
      <div style={{paddingTop:12,borderTop:`1px solid ${C.border}`}}>
        <div style={{fontSize:"0.66rem",fontWeight:800,textTransform:"uppercase",letterSpacing:"0.1em",color:C.stone,marginBottom:7}}>💰 Cotización</div>
        <div style={{border:`1px solid ${C.border}`,borderRadius:9,overflow:"hidden"}}>
          {[["gastos","Gastos"],["anest","Anestesiólogo"],["implantes","Implantes / Material"],["otrosAmt","Otros"]].map(([k,label])=>(
            <div key={k} style={{display:"grid",gridTemplateColumns:"1fr 120px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{padding:"10px 12px",fontSize:"0.84rem",borderRight:`1px solid ${C.border}`,background:k==="anest"&&noAnest?C.orangePale:C.cream,fontWeight:k==="anest"?700:500,color:k==="anest"&&noAnest?C.orange:C.inkSoft,display:"flex",alignItems:"center"}}>
                {k==="anest"&&noAnest?"⚠️ ":""}{label}
              </div>
              <input type="number" placeholder={k==="anest"?"Pendiente":"0.00"} value={data.costs?.[k]||""} onChange={e=>upC(k,e.target.value)}
                style={{border:"none",background:k==="anest"&&noAnest?"#FEF8F0":"white",padding:"10px 12px",fontWeight:700,textAlign:"right",fontFamily:"inherit",fontSize:"0.9rem",outline:"none",width:"100%"}}/>
            </div>
          ))}
          <div style={{borderBottom:`1px solid ${C.border}`}}>
            <input type="text" placeholder="Descripción de otros gastos…" value={data.costs?.otrosDesc||""} onChange={e=>upC("otrosDesc",e.target.value)}
              style={{width:"100%",border:"none",background:"#FAFAF8",padding:"8px 12px",fontSize:"0.82rem",color:C.inkSoft,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 120px",background:C.ink}}>
            <div style={{padding:"10px 12px",fontWeight:800,color:"rgba(255,255,255,0.55)",borderRight:"1px solid rgba(255,255,255,0.1)",fontSize:"0.82rem"}}>TOTAL</div>
            <div style={{padding:"10px 12px",fontWeight:800,textAlign:"right",color:"#7EC8C8",fontSize:"0.93rem"}}>{fmt(total)||"$0.00"}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP ─────────────────────────────────────────────────────
function App() {
  const [tab,       setTab]      = useState("list");
  const [records,   setRecords]  = useState(()=>{try{return JSON.parse(localStorage.getItem("oftalmo-v2")||"[]");}catch{return [];}});
  const [apiKey,    setApiKey]   = useState(()=>localStorage.getItem("oftalmo-key")||"");
  const [apiKeyIn,  setApiKeyIn] = useState(()=>localStorage.getItem("oftalmo-key")||"");
  const [filter,    setFilter]   = useState("all");
  const [search,    setSearch]   = useState("");
  const [modal,     setModal]    = useState(null);
  const [form,      setForm]     = useState(mkForm);
  const [errors,    setErrors]   = useState({});
  const [scanState, setScanState]= useState("idle");
  const [scanImg,   setScanImg]  = useState(null);
  const [scanData,  setScanData] = useState(null);
  const [scanError, setScanError]= useState("");
  const fileRef = useRef();

  const applyAuto = (recs) => recs.map(r=>{
    if(r.status!=="scheduled") return r;
    const active=r.activeEyes||[];
    const allPast=active.length>0&&active.every(eye=>{ const d=r.eyes?.[eye]?.dateScheduled; return d&&isPast(d); });
    return allPast?{...r,status:"done"}:r;
  });

  const persist = (recs) => {
    const u=applyAuto(recs);
    localStorage.setItem("oftalmo-v2",JSON.stringify(u));
    return u;
  };

  const saveKey=()=>{
    if(!apiKeyIn.trim()) return alert("Pega tu API key.");
    if(!apiKeyIn.startsWith("sk-ant-")) return alert('Debe comenzar con "sk-ant-…"');
    localStorage.setItem("oftalmo-key",apiKeyIn.trim()); setApiKey(apiKeyIn.trim()); alert("✅ Guardada.");
  };

  const live = applyAuto(records);
  const stats={
    total:records.length,
    pending:live.filter(r=>r.status==="pending").length,
    done:live.filter(r=>r.status==="done").length,
    noAnest:live.filter(r=>r.status!=="done"&&(r.activeEyes||[]).some(eye=>!r.eyes?.[eye]?.costs?.anest)).length,
  };

  const filtered = live.filter(r=>{
    const q=search.toLowerCase();
    const st=(r.activeEyes||[]).map(e=>r.eyes?.[e]?.surgery||"").join(" ").toLowerCase();
    const mQ=!q||r.name.toLowerCase().includes(q)||st.includes(q);
    const mF=filter==="all"||r.status===filter||(filter==="noAnest"&&r.status!=="done"&&(r.activeEyes||[]).some(eye=>!r.eyes?.[eye]?.costs?.anest));
    return mQ&&mF;
  }).sort((a,b)=>{
    const best=r=>(r.activeEyes||[]).map(e=>r.eyes?.[e]?.dateScheduled||r.eyes?.[e]?.dateTentative).filter(Boolean).sort()[0];
    const dA=best(a),dB=best(b);
    if(!dA&&!dB)return 0; if(!dA)return 1; if(!dB)return -1;
    return new Date(dA)-new Date(dB);
  });

  const openNew=(pre)=>{ setForm(pre||mkForm()); setErrors({}); setModal("new"); };
  const openEdit=(r)=>{ setForm({...mkForm(),...r,eyes:{OD:{...mkEye(),...(r.eyes?.OD||{}),costs:{...mkEye().costs,...(r.eyes?.OD?.costs||{})},surgeryPlus:[...(r.eyes?.OD?.surgeryPlus||[])]},OI:{...mkEye(),...(r.eyes?.OI||{}),costs:{...mkEye().costs,...(r.eyes?.OI?.costs||{})},surgeryPlus:[...(r.eyes?.OI?.surgeryPlus||[])]}}}); setErrors({}); setModal(r.id); };
  const closeModal=()=>setModal(null);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setEye=(eye,d)=>setForm(f=>({...f,eyes:{...f.eyes,[eye]:d}}));
  const clrErr=(...ks)=>setErrors(e=>{const n={...e};ks.forEach(k=>delete n[k]);return n;});

  const toggleEye=(eye)=>{
    const cur=form.activeEyes||[];
    setF("activeEyes",cur.includes(eye)?cur.filter(e=>e!==eye):[...cur,eye].sort());
    clrErr("activeEyes");
  };

  const validate=()=>{
    const e={};
    if(!form.name.trim())         e.name="Nombre del paciente obligatorio";
    if(!form.tel1.trim())         e.tel1="Teléfono 1 obligatorio";
    if(!form.tel2.trim())         e.tel2="Teléfono 2 obligatorio";
    if(!(form.activeEyes||[]).length) e.activeEyes="Selecciona al menos un ojo";
    (form.activeEyes||[]).forEach(eye=>{ if(!form.eyes?.[eye]?.surgery) e[`${eye}_s`]=`Procedimiento ${eye} obligatorio`; });
    return e;
  };

  const saveRecord=()=>{
    const e=validate(); if(Object.keys(e).length){setErrors(e);return;}
    const rec={...form,id:modal==="new"?uid():modal};
    const next=modal==="new"?[rec,...records]:records.map(r=>r.id===modal?rec:r);
    setRecords(persist(next)); closeModal();
  };

  const deleteRecord=()=>{
    if(!confirm("¿Eliminar esta cotización?"))return;
    const next=records.filter(r=>r.id!==modal);
    setRecords(persist(next)); closeModal();
  };

  // Scan
  const handleFile=(e)=>{
    const file=e.target.files[0]; if(!file)return;
    if(!apiKey){alert("Configura tu API key primero.");return;}
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      setScanImg(ev.target.result); setScanState("loading"); setScanError(""); setScanData(null);
      try{const d=await callClaude(ev.target.result.split(",")[1],file.type||"image/jpeg",apiKey);setScanData(d);setScanState("done");}
      catch(err){setScanError(err.message);setScanState("error");}
    };
    reader.readAsDataURL(file); e.target.value="";
  };

  const callClaude=async(b64,mt,key)=>{
    const sys=`Eres asistente en oftalmología. Extrae datos de la cotización. Solo JSON sin markdown:
{"nombre":"","cirugia_principal":"","procedimientos_adicionales":[],"ojo":"OD|OI|AO","costo_cirujano":null,"costo_anestesia":null,"costo_material":null,"fecha_probable":"","notas":""}`;
    let res;
    try{res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,system:sys,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:mt,data:b64}},{type:"text",text:"Extrae los datos de esta cotización oftalmológica."}]}]})});}
    catch{throw new Error("Sin conexión a internet.");}
    if(!res.ok){let d="";try{const j=await res.json();d=j.error?.message||"";}catch{}if(res.status===401)throw new Error("API key inválida.");throw new Error(`Error ${res.status}: ${d}`);}
    const data=await res.json();
    const text=data.content.map(c=>c.text||"").join("");
    try{return JSON.parse(text.replace(/```json|```/g,"").trim());}
    catch{throw new Error("Respuesta inesperada. Intenta de nuevo.");}
  };

  const useScan=()=>{
    if(!scanData)return;
    const ey=(scanData.ojo||"").toUpperCase();
    const ae=ey==="OD"?["OD"]:ey==="OI"?["OI"]:["OD","OI"];
    const costs={gastos:scanData.costo_cirujano||"",anest:scanData.costo_anestesia||"",implantes:scanData.costo_material||"",otrosAmt:"",otrosDesc:""};
    const ed={...mkEye(),surgery:scanData.cirugia_principal||"",surgeryPlus:scanData.procedimientos_adicionales||[],costs};
    const f=mkForm(); f.name=scanData.nombre||""; f.notes=scanData.notas||""; f.activeEyes=ae;
    ae.forEach(eye=>{ f.eyes[eye]={...ed,costs:{...costs}}; });
    openNew(f); setTab("list");
  };

  const exportExcel=()=>{
    if(!records.length){alert("No hay cotizaciones para exportar.");return;}
    const sl={pending:"Pendiente",scheduled:"Programada",done:"Operado/a"};
    const rows=[];
    records.forEach(r=>{
      const eyes=r.activeEyes||[];
      (eyes.length?eyes:["—"]).forEach(eye=>{
        const ed=eyes.length?r.eyes?.[eye]||{}:{};
        const c=ed.costs||{};
        const tot=["gastos","anest","implantes","otrosAmt"].reduce((s,k)=>s+(parseFloat(c[k])||0),0);
        rows.push({"Paciente":r.name,"Tel 1":r.tel1,"Tel 2":r.tel2,"Ojo":eye,"Cirugía":ed.surgery||"","Simultáneos":(ed.surgeryPlus||[]).join(" + "),"LIO":ed.lioNeeded?"Sí":"No","Tipo LIO":ed.lioType||"","Potencia":ed.lioPower||"","Marca LIO":ed.lioNotes||"","F. Tentativa":fmtD(ed.dateTentative),"F. Programada":fmtD(ed.dateScheduled),"Gastos":parseFloat(c.gastos)||"","Anestesiólogo":parseFloat(c.anest)||"","Implantes":parseFloat(c.implantes)||"","Otros monto":parseFloat(c.otrosAmt)||"","Otros desc":c.otrosDesc||"","Total":tot||"","Estado":sl[r.status]||r.status,"Notas":r.notes||""});
      });
    });
    const cols=Object.keys(rows[0]);
    const esc=(v)=>{ const s=String(v==null?"":v); return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`:s; };
    const csv="\uFEFF"+cols.join(",")+"\n"+rows.map(r=>cols.map(c=>esc(r[c])).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`cotizaciones_${toStr()}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const dCol=(d)=>{const n=dDiff(d);if(n===null)return C.stone;if(n<0)return C.red;if(n<=7)return C.orange;if(n<=30)return C.gold;return C.green;};
  const errKeys=Object.keys(errors).filter(k=>errors[k]);

  // ── RENDER ──────────────────────────────────────────────
  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:C.cream,minHeight:"100vh",color:C.ink}}>

      {/* HEADER */}
      <div style={{background:C.ink,color:C.cream,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}}>
        <div style={{fontWeight:800,fontSize:"1.05rem"}}>👁 Oftalmología <span style={{color:"#7EC8C8"}}>·</span> Cotizaciones</div>
        <div style={{display:"flex",gap:14}}>
          {[["total","Total",C.stoneLight],["pending","Pend.",C.gold],["noAnest","Anest.",C.orange],["done","Oper.","#7EC8C8"]].map(([k,l,c])=>(
            <div key={k} style={{textAlign:"center"}}>
              <div style={{fontSize:"1.1rem",fontWeight:800,color:c,lineHeight:1}}>{stats[k]}</div>
              <div style={{fontSize:"0.56rem",color:C.stoneLight,textTransform:"uppercase"}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",background:"white",borderBottom:`1px solid ${C.border}`,padding:"0 14px",gap:2,overflowX:"auto"}}>
        {[["list","📋 Pacientes"],["scan","📷 Escanear"],["key","🔑 API Key"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{padding:"13px 16px",fontSize:"0.85rem",fontWeight:tab===k?800:500,color:tab===k?C.teal:C.stone,background:"none",border:"none",borderBottom:`3px solid ${tab===k?C.teal:"transparent"}`,cursor:"pointer",whiteSpace:"nowrap"}}>{l}</button>
        ))}
      </div>

      <div style={{padding:16,maxWidth:1100,margin:"0 auto"}}>

        {/* ══ LISTA ══ */}
        {tab==="list"&&(
          <div>
            {stats.noAnest>0&&(
              <div onClick={()=>setFilter("noAnest")} style={{background:C.orangePale,border:`1.5px solid #F0C090`,borderRadius:11,padding:"11px 15px",marginBottom:12,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                <span>⚠️</span><span style={{fontWeight:700,color:C.orange}}>{stats.noAnest} paciente{stats.noAnest>1?"s":""} sin cotización de anestesia</span>
              </div>
            )}
            <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <Btn onClick={()=>openNew()}>＋ Nueva</Btn>
              <Btn variant="outline" onClick={exportExcel}>📥 Excel</Btn>
              <input style={{flex:1,minWidth:140,padding:"11px 12px",border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:"16px",outline:"none"}} placeholder="Buscar…" value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <div style={{display:"flex",gap:7,marginBottom:13,flexWrap:"wrap"}}>
              {[["all","Todos"],["pending","⏳ Pendientes"],["scheduled","📅 Programados"],["done","✅ Operados"],["noAnest","⚠️ Sin anestesia"]].map(([k,l])=>(
                <button key={k} onClick={()=>setFilter(k)} style={{padding:"6px 13px",borderRadius:20,fontSize:"0.78rem",fontWeight:700,cursor:"pointer",border:`1.5px solid ${filter===k?C.teal:C.border}`,background:filter===k?C.teal:"white",color:filter===k?"white":C.stone}}>{l}</button>
              ))}
            </div>

            <div style={{background:"white",borderRadius:13,border:`1px solid ${C.border}`,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
              {filtered.length===0?(
                <div style={{textAlign:"center",padding:"44px 24px",color:C.stone}}>
                  <div style={{fontSize:"2.5rem",marginBottom:10,opacity:0.3}}>👁</div>
                  <div style={{fontWeight:700,marginBottom:4}}>Sin resultados</div>
                  <div style={{fontSize:"0.84rem"}}>Agrega una cotización o ajusta los filtros.</div>
                </div>
              ):(
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.86rem"}}>
                    <thead>
                      <tr style={{background:C.ink}}>
                        {["Paciente","Ojo","Cirugía","Fecha","Total","Anest.","Estado"].map(h=>(
                          <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:"0.62rem",fontWeight:800,textTransform:"uppercase",letterSpacing:"0.09em",color:C.stoneLight,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((r,i)=>{
                        const eyes=r.activeEyes||[];
                        const best=eyes.map(e=>r.eyes?.[e]?.dateScheduled||r.eyes?.[e]?.dateTentative).filter(Boolean).sort()[0];
                        const dias=dDiff(best);
                        const total=eyes.reduce((s,e)=>{ const c=r.eyes?.[e]?.costs||{}; return s+["gastos","anest","implantes","otrosAmt"].reduce((ss,k)=>ss+(parseFloat(c[k])||0),0); },0);
                        const noA=eyes.some(e=>!r.eyes?.[e]?.costs?.anest||r.eyes?.[e]?.costs?.anest==="");
                        return(
                          <tr key={r.id} onClick={()=>openEdit(r)} style={{borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:i%2===0?"white":"#FAFAF8"}}>
                            <td style={{padding:"11px 12px"}}>
                              <div style={{fontWeight:800,color:C.ink}}>{r.name}</div>
                              <div style={{fontSize:"0.72rem",color:C.stone,marginTop:2}}>{[r.tel1,r.tel2].filter(Boolean).join(" · ")}</div>
                            </td>
                            <td style={{padding:"11px 12px"}}>
                              {eyes.map(eye=>(
                                <span key={eye} style={{display:"block",padding:"2px 8px",borderRadius:6,fontSize:"0.7rem",fontWeight:800,background:eye==="OD"?C.tealPale:C.bluePale,color:eye==="OD"?C.teal:C.blue,marginBottom:2,width:"fit-content"}}>👁 {eye}</span>
                              ))}
                              {r.eyeFirst&&eyes.length>1&&<span style={{fontSize:"0.67rem",color:C.stone}}>inicia {r.eyeFirst}</span>}
                            </td>
                            <td style={{padding:"11px 12px",maxWidth:190}}>
                              {eyes.map(eye=>{
                                const ed=r.eyes?.[eye]; if(!ed?.surgery)return null;
                                return(
                                  <div key={eye} style={{marginBottom:3}}>
                                    <span style={{fontSize:"0.67rem",fontWeight:800,color:eye==="OD"?C.teal:C.blue,marginRight:4}}>{eye}:</span>
                                    <span style={{fontWeight:600}}>{ed.surgery}</span>
                                    {ed.lioNeeded&&<div style={{fontSize:"0.67rem",color:C.blue}}>🔬{ed.lioType?` ${ed.lioType}`:""}{ ed.lioPower?` · ${ed.lioPower}D`:""}</div>}
                                  </div>
                                );
                              })}
                            </td>
                            <td style={{padding:"11px 12px",whiteSpace:"nowrap"}}>
                              {eyes.map(eye=>{
                                const ds=r.eyes?.[eye]?.dateScheduled,dt=r.eyes?.[eye]?.dateTentative;
                                if(!ds&&!dt)return null;
                                return(
                                  <div key={eye} style={{marginBottom:2,fontSize:"0.82rem"}}>
                                    <span style={{fontSize:"0.66rem",fontWeight:800,color:eye==="OD"?C.teal:C.blue,marginRight:3}}>{eye}:</span>
                                    {ds?<span style={{fontWeight:700,color:dCol(ds)}}>📅 {fmtD(ds)}</span>:<span style={{color:C.stone,fontStyle:"italic"}}>~{fmtD(dt)}</span>}
                                  </div>
                                );
                              })}
                              {best&&r.status!=="done"&&dias!==null&&<div style={{fontSize:"0.67rem",color:dCol(best),fontWeight:700,marginTop:2}}>{dias<0?`Hace ${Math.abs(dias)}d`:dias===0?"Hoy":`En ${dias}d`}</div>}
                            </td>
                            <td style={{padding:"11px 12px",fontWeight:700}}>{total>0?fmt(total):<span style={{color:C.stone}}>—</span>}</td>
                            <td style={{padding:"11px 12px"}}>{noA&&r.status!=="done"?<span style={{background:C.orangePale,color:C.orange,borderRadius:6,padding:"3px 8px",fontSize:"0.69rem",fontWeight:800}}>⚠️</span>:<span style={{color:C.green,fontWeight:800}}>✓</span>}</td>
                            <td style={{padding:"11px 12px"}}><StatusBadge s={r.status}/></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ══ SCAN ══ */}
        {tab==="scan"&&(
          <div>
            {!apiKey&&<div style={{background:C.orangePale,border:`1.5px solid #F0C090`,borderRadius:11,padding:"12px 15px",marginBottom:13,fontSize:"0.84rem",color:C.orange}}>⚠️ Configura tu API key en la pestaña 🔑 antes de escanear.</div>}
            <div onClick={()=>{if(!apiKey){setTab("key");return;}fileRef.current.click();}} style={{background:"white",border:`2px dashed ${C.border}`,borderRadius:15,padding:"40px 24px",textAlign:"center",cursor:"pointer",marginBottom:13}}>
              <div style={{fontSize:"2.5rem",marginBottom:10}}>📷</div>
              <div style={{fontWeight:800,fontSize:"1.05rem",marginBottom:5}}>Fotografiar Cotización</div>
              <div style={{color:C.stone,fontSize:"0.85rem"}}>Toca para abrir cámara</div>
              <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFile}/>
            </div>
            {scanState==="loading"&&<div style={{textAlign:"center",padding:28}}><div style={{width:38,height:38,border:`3px solid ${C.border}`,borderTopColor:C.teal,borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 10px"}}/><div style={{color:C.stone}}>Analizando con IA…</div></div>}
            {scanState==="error"&&<div style={{background:C.redPale,border:`1.5px solid #F0C0C0`,borderRadius:11,padding:"14px 15px"}}><div style={{fontWeight:800,color:C.red,marginBottom:4}}>⚠️ Error</div><div style={{fontSize:"0.84rem",color:"#7A2020"}}>{scanError}</div><Btn variant="danger" style={{marginTop:10}} onClick={()=>{setScanState("idle");setScanImg(null);}}>↩ Intentar de nuevo</Btn></div>}
            {scanState==="done"&&scanData&&(
              <div style={{background:"white",borderRadius:13,border:`1px solid ${C.border}`,overflow:"hidden"}}>
                {scanImg&&<img src={scanImg} alt="" style={{width:"100%",maxHeight:250,objectFit:"contain",display:"block"}}/>}
                <div style={{padding:15}}>
                  <div style={{fontSize:"0.67rem",fontWeight:800,textTransform:"uppercase",color:C.teal,marginBottom:9}}>✦ Datos extraídos</div>
                  {[["Paciente",scanData.nombre],["Cirugía",scanData.cirugia_principal],["Ojo",scanData.ojo],["Gastos",fmt(scanData.costo_cirujano)],["Anestesia",fmt(scanData.costo_anestesia)],["Notas",scanData.notas]].filter(([,v])=>v).map(([k,v])=>(
                    <div key={k} style={{display:"flex",gap:10,marginBottom:4,fontSize:"0.85rem"}}><span style={{fontWeight:700,color:C.teal,minWidth:90,flexShrink:0}}>{k}:</span><span>{v}</span></div>
                  ))}
                  <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:13}}>
                    <Btn variant="outline" onClick={()=>{setScanState("idle");setScanImg(null);}}>↩ Otra foto</Btn>
                    <Btn onClick={useScan}>Crear cotización →</Btn>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ API KEY ══ */}
        {tab==="key"&&(
          <div style={{background:"white",borderRadius:13,border:`1px solid ${C.border}`,padding:20,maxWidth:500}}>
            <div style={{fontWeight:800,fontSize:"1rem",marginBottom:6}}>🔑 API Key de Anthropic</div>
            <div style={{fontSize:"0.82rem",color:C.stone,marginBottom:13,lineHeight:1.6}}>Necesaria para escanear cotizaciones con la cámara. Se guarda solo en este dispositivo.</div>
            <Fld label="Tu API Key"><Inp type="password" placeholder="sk-ant-api03-…" value={apiKeyIn} onChange={e=>setApiKeyIn(e.target.value)}/></Fld>
            {apiKey&&<div style={{fontSize:"0.78rem",color:C.green,margin:"7px 0"}}>✅ API key configurada</div>}
            <Btn style={{marginTop:10}} onClick={saveKey}>Guardar</Btn>
            <div style={{marginTop:13,padding:"12px 14px",background:C.tealPale,borderRadius:9,fontSize:"0.76rem",color:C.teal,lineHeight:1.9}}>
              <strong>Cómo obtenerla:</strong><br/>
              1. Ve a <strong>console.anthropic.com</strong><br/>
              2. API Keys → Create Key<br/>
              3. Copia y pega aquí (sk-ant-…)
            </div>
          </div>
        )}
      </div>

      {/* ══ MODAL ══ */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(26,24,20,0.62)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:12,backdropFilter:"blur(4px)"}}>
          <div style={{background:C.warm,borderRadius:20,width:"100%",maxWidth:760,maxHeight:"95vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.25)"}}>

            <div style={{padding:"15px 19px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:C.warm,zIndex:10,borderRadius:"20px 20px 0 0"}}>
              <span style={{fontWeight:800,fontSize:"1.03rem"}}>{modal==="new"?"Nueva Cotización":"Editar Cotización"}</span>
              <button onClick={closeModal} style={{width:32,height:32,borderRadius:"50%",border:"none",background:C.cream,cursor:"pointer",fontSize:"1rem",color:C.stone,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>

            {errKeys.length>0&&(
              <div style={{margin:"12px 19px 0",background:C.redPale,border:`1.5px solid #F0C0C0`,borderRadius:10,padding:"10px 14px"}}>
                <div style={{fontWeight:800,color:C.red,fontSize:"0.85rem",marginBottom:5}}>⚠️ Completa los siguientes campos:</div>
                <ul style={{margin:0,paddingLeft:16}}>
                  {errKeys.map(k=><li key={k} style={{fontSize:"0.82rem",color:C.red,marginBottom:2}}>{errors[k]}</li>)}
                </ul>
              </div>
            )}

            <div style={{padding:"15px 19px"}}>
              <Sec title="👤 Paciente">
                <div style={{display:"grid",gap:10}}>
                  <Fld label="Nombre completo" req err={errors.name}>
                    <Inp err={!!errors.name} value={form.name} onChange={e=>{setF("name",e.target.value);clrErr("name");}} placeholder="Nombre del paciente"/>
                  </Fld>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <Fld label="Teléfono 1" req err={errors.tel1}>
                      <Inp err={!!errors.tel1} type="tel" value={form.tel1} onChange={e=>{setF("tel1",e.target.value);clrErr("tel1");}} placeholder="55 1234 5678"/>
                    </Fld>
                    <Fld label="Teléfono 2" req err={errors.tel2}>
                      <Inp err={!!errors.tel2} type="tel" value={form.tel2} onChange={e=>{setF("tel2",e.target.value);clrErr("tel2");}} placeholder="Número alternativo"/>
                    </Fld>
                  </div>
                </div>
              </Sec>

              <Sec title="👁 Ojos a Operar">
                {errors.activeEyes&&<div style={{fontSize:"0.77rem",color:C.red,fontWeight:700,marginBottom:8}}>⚠️ {errors.activeEyes}</div>}
                <div style={{display:"flex",gap:10,marginBottom:11}}>
                  {["OD","OI"].map(eye=>{
                    const active=(form.activeEyes||[]).includes(eye);
                    return(
                      <button key={eye} onClick={()=>toggleEye(eye)} style={{flex:1,padding:12,borderRadius:10,border:`2px solid ${active?C.teal:C.border}`,background:active?C.tealPale:"white",fontWeight:800,fontSize:"0.95rem",cursor:"pointer",color:active?C.teal:C.stone}}>
                        👁 {eye}<br/><span style={{fontSize:"0.71rem",fontWeight:500}}>{eye==="OD"?"Ojo derecho":"Ojo izquierdo"}</span>
                      </button>
                    );
                  })}
                </div>
                {(form.activeEyes||[]).length===2&&(
                  <div style={{marginBottom:12}}>
                    <Fld label="¿Con cuál ojo se inicia?">
                      <Sel value={form.eyeFirst||""} onChange={e=>setF("eyeFirst",e.target.value)}>
                        <option value="">Por definir</option>
                        <option value="OD">Inicia OD (derecho)</option>
                        <option value="OI">Inicia OI (izquierdo)</option>
                      </Sel>
                    </Fld>
                  </div>
                )}
                {(form.activeEyes||[]).length>0&&(
                  <div style={{display:"grid",gridTemplateColumns:(form.activeEyes||[]).length===2?"1fr 1fr":"1fr",gap:12}}>
                    {(form.activeEyes||[]).map(eye=>(
                      <div key={eye}>
                        <div style={{fontSize:"0.7rem",fontWeight:800,textTransform:"uppercase",color:eye==="OD"?C.teal:C.blue,marginBottom:6}}>
                          <span style={{display:"inline-flex",padding:"2px 10px",borderRadius:6,background:eye==="OD"?C.tealPale:C.bluePale}}>👁 {eye} — {eye==="OD"?"Ojo Derecho":"Ojo Izquierdo"}</span>
                        </div>
                        <EyePanel data={form.eyes?.[eye]||mkEye()} onChange={d=>{setEye(eye,d);clrErr(`${eye}_s`);}} errors={{surgery:errors[`${eye}_s`]}}/>
                      </div>
                    ))}
                  </div>
                )}
              </Sec>

              <Sec title="📋 Estado">
                <Fld label="Estado" hint="💡 Cuando la fecha de programación pasa, cambia a ✅ automáticamente.">
                  <Sel value={form.status||"pending"} onChange={e=>setF("status",e.target.value)}>
                    <option value="pending">⏳ Pendiente</option>
                    <option value="scheduled">📅 Programada</option>
                    <option value="done">✅ Operado/a</option>
                  </Sel>
                </Fld>
              </Sec>

              <Sec title="📝 Notas">
                <textarea style={{width:"100%",padding:"11px 12px",border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:"16px",color:C.ink,background:"white",outline:"none",resize:"vertical",minHeight:70,boxSizing:"border-box"}} value={form.notes||""} onChange={e=>setF("notes",e.target.value)} placeholder="Alergias, medicamentos, indicaciones especiales…"/>
              </Sec>
            </div>

            <div style={{padding:"12px 19px 18px",display:"flex",gap:10,justifyContent:"flex-end",borderTop:`1px solid ${C.border}`}}>
              {modal!=="new"&&<Btn variant="danger" onClick={deleteRecord}>🗑 Eliminar</Btn>}
              <Btn variant="outline" onClick={closeModal}>Cancelar</Btn>
              <Btn onClick={saveRecord}>Guardar cotización</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
